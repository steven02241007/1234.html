<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #050505, #000);
  color: #00ffe1;
  font-family: 'Noto Sans TC', sans-serif;
  text-align: center;
  overflow: hidden;
  transition: 1s;

header {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px;
  background: rgba(0,0,0,0.6);

nav ul {

  padding: 0;
}

nav a {

  cursor: pointer;
  opacity: 0.7;
}

.container {

}

h1 {

}

.card {
  display: inline-block;
  padding: 20px;
  background: rgba(0,0,0,0.5);
  border-radius: 20px;
}

img {
  width: 300px;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  background: transparent;
  border: 1px solid #00ffe1;
  color: #00ffe1;
  cursor: pointer;
}

.glitch {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: red;
  opacity: 0;
}
</style>
</head>

<<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>迷因帝國 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle, #000 60%, #020202);
  color: #00ffcc;
  font-family: 'Noto Sans TC', sans-serif;
  text-align: center;
  padding: 40px;
  transition: 0.3s;
}

/* 主容器 */
.container {
  background: rgba(0,0,0,0.6);
  border-radius: 20px;
  padding: 30px;
  display: inline-block;
  box-shadow: 0 0 20px #00ffcc44;
}

/* 標題 */
h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

/* 圖片 */
img {
  width: 320px;
  border-radius: 15px;
  margin: 20px 0;
  box-shadow: 0 0 15px #00ffcc55;
}

/* 按鈕 */
button {
  padding: 12px 25px;
  font-size: 18px;
  background: linear-gradient(45deg, #ff4757, #ff6b81);
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin: 10px;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.1);
}

/* quote */
#quote {
  position: fixed;
  top: 15px;
  left: 15px;
  font-size: 14px;
  opacity: 0.8;
}

/* 哲學按鈕 */
#philosophy {
  position: fixed;
  bottom: 20px;
  right: 20px;
}

/* emoji */
.emoji {
  position: absolute;
  pointer-events: none;
  font-size: 20px;
  transition: 1s;
}

/* glitch */
.glitch {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 40px;
  color: red;
  opacity: 0;
}

/* shake */
@keyframes shake {
  0% { transform: translate(0, 0); }
  25% { transform: translate(5px, -5px); }
  50% { transform: translate(-5px, 5px); }
  75% { transform: translate(5px, 5px); }
  100% { transform: translate(0, 0); }
}

.shake {
  animation: shake 0.3s;
}

/* 偽錯誤 */
#fakeError {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #0000aa;
  color: white;
  font-size: 30px;
  padding: 50px;
  z-index: 999;
}
</style>
</head>

<body>
  <header>
  <nav>
    <ul>
      <li><a href="#">HOME</a></li>
      <li><a href="#">ABOUT</a></li>
      <li><a href="#">Draw</a></li>
      <li><a href="#">Snake</a></li>
      <li><a href="#">SNS</a></li>
    </ul>
  </nav>
</header>
<div class="container">
  <h1>迷因帝國 🎉</h1>

  <img id="memeImage" src="meme01.png">
  <p id="text">點擊按鈕看看會發生什麼 😂</p>

  <button onclick="changeMeme()">換一個迷因</button>
</div>

<div id="quote">點擊任何地方</div>
<button id="philosophy">哲學按鈕</button>

<div id="glitch" class="glitch"></div>

<div id="fakeError">
  系統發生錯誤 😨<br>
  錯誤代碼：MEME_OVERLOAD
</div>

<audio autoplay loop id="bgm">
  <source src="bakamitai.mp3" type="audio/mpeg">
</audio>

<script>
// ===== 迷因 =====
const memes = [
  { text: "你看看，到處都是迷因 🤯", img: "meme01.png" },
  { text: "帥到連自己都懷疑 😎", img: "meme2.jpg" }
];

function changeMeme() {
  const random = Math.floor(Math.random() * memes.length);
  document.getElementById("text").innerText = memes[random].text;
  document.getElementById("memeImage").src = memes[random].img;
}

// 自動亂跳
setInterval(() => {
  if (Math.random() < 0.3) changeMeme();
}, 2000);

// ===== 語錄 =====
const quotes = [
  "香蕉其實在監視你",
  "你點擊了，但點擊也點擊了你",
  "這句話沒有結尾因為",
  "我不是AI，我是你滑鼠的靈魂",
  "CSS正在評判你的人生",
  "如果你關掉我，我會變得更強",
  "網頁其實是活的，只是你不信"
];

document.body.onclick = () => {
  const q = quotes[Math.floor(Math.random() * quotes.length)];
  document.getElementById("quote").innerText = q;
};

// ===== emoji =====
document.addEventListener("mousemove", (e) => {
  const emoji = document.createElement("div");
  emoji.className = "emoji";
  emoji.innerText = ["👁️","🧠","🍌","🌀","🐸"][Math.floor(Math.random()*5)];
  emoji.style.left = e.pageX + "px";
  emoji.style.top = e.pageY + "px";

  document.body.appendChild(emoji);

  setTimeout(() => {
    emoji.style.transform = `translate(${Math.random()*200-100}px, ${Math.random()*200-100}px)`;
  }, 50);

  setTimeout(() => emoji.remove(), 1000);
});

// ===== 哲學 =====
document.getElementById("philosophy").onclick = () => {
  alert("當你按下這個按鈕時，按鈕也按下了你。\n請思考：div 是否有靈魂？");
};

// ===== glitch =====
setInterval(() => {
  if (Math.random() < 0.2) {
    const g = document.getElementById("glitch");
    g.style.opacity = 1;
    g.innerText = Math.random().toString(36).substring(2);

    setTimeout(() => g.style.opacity = 0, 200);
  }
}, 1000);

// ===== 抖動 =====
setInterval(() => {
  if (Math.random() < 0.1) {
    document.body.classList.add("shake");
    setTimeout(() => {
      document.body.classList.remove("shake");
    }, 300);
  }
}, 2000);

// ===== 偽錯誤 =====
setInterval(() => {
  if (Math.random() < 0.05) {
    document.getElementById("fakeError").style.display = "block";
  }
}, 5000);

// ===== 滑鼠消失 =====
setInterval(() => {
  document.body.style.cursor = Math.random() < 0.1 ? "none" : "default";
}, 2000);

// ===== 音樂變速 =====
const audio = document.getElementById("bgm");
setInterval(() => {
  audio.playbackRate = 0.8 + Math.random() * 1.5;
}, 3000);

// ===== 隱藏彩蛋（鍵盤） =====
let secret = "";
document.addEventListener("keydown", (e) => {
  secret += e.key;

  if (secret.includes("meme")) {
    alert("你發現了隱藏彩蛋 👁️");
    document.body.style.background = "red";
    secret = "";
  }

  if (secret.length > 10) secret = "";
});
</script>

</body>
</html>

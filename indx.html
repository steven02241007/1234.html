    <!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>迷因帝國 🎉</title>
    <style>
        body {
            font-family: "Arial", sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            text-align: center;
            padding: 80px;
            color: #333;
        }

        h1 {
            font-size: 48px;
        }

        p {
            font-size: 24px;
            margin: 30px 0;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #e84118;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <h1>迷因帝國 🎉</h1>
    <p id="text">點擊按鈕看看會發生什麼</p>

    <button onclick="changeText()">點我</button>

    <script>
        const memes = [
            "你在滑手機，但手機也在滑你 🤯",
            "我沒有偷懶，我在節能模式 😎",
            "今天不努力，明天繼續努力 💀",
            "這不是BUG，是特色 ✨",
            "再睡5分鐘 = 30分鐘 😴",
            "我本來想認真，但迷因太香 😂"

        ];

        function changeText() {
            const randomIndex = Math.floor(Math.random() * memes.length);
            document.getElementById("text").innerText = memes[randomIndex];
        }
    </script>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>迷因帝國 🎉</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            text-align: center;
            padding: 50px;
        }

        h1 {
            font-size: 40px;
        }

        img {
            width: 300px;
            border-radius: 10px;
            margin: 20px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        p {
            font-size: 22px;
            margin: 20px;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: #e84118;
        }
    </style>
</head>
<body>

    <h1>迷因帝國 🎉</h1>

    <img id="memeImage" src="meme1.jpg" alt="迷因圖片">

    <p id="text">點擊按鈕看看會發生什麼 😂</p>

    <button onclick="changeMeme()">換一個迷因</button>

    <script>
        const memes = [
            {
                text: "你看看，到處都是迷因 🤯",
                img: "meme1.jpg"
            },
            {
                text: "帥到連自己都懷疑 😎",
                img: "meme2.jpg"
            }
        ];

        function changeMeme() {
            const random = Math.floor(Math.random() * memes.length);
            document.getElementById("text").innerText = memes[random].text;
            document.getElementById("memeImage").src = memes[random].img;
        }
    </script>

</body>
</html>
